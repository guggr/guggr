[workspace]
members = ["gen/proto_types", "config", "database/database-client", "evaluator"]

resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Guggr"]

[workspace.dependencies]
prost = "0.14"
prost-build = "0.14"
protocheck = "0.1"
protocheck-build = "0.1"
temp-env = "0.3.6"
urlencoding = "2.1.3"
diesel = "2.3.6"
chrono = "0.4.43"
diesel_migrations = "2.3.1"
thiserror = "2.0.18"
validator = { version = "0.20", features = ["derive"] }
gen-proto-types = { path = "gen/proto_types" }
database-client = { path = "database/database-client" }
config = { path = "config" }
async-trait = "0.1.89"
tokio = "1.49.0"
rand = "0.9.2"
anyhow = "1.0.100"
nanoid = "0.4.0"
tracing = "0.1.44"
deadpool-lapin = "0.13.1"
lapin = "3.7.2"
futures-lite = "2.6.1"
tracing-subscriber = "0.3.22"
ipnetwork = "0.20.0"
ipnet = "2.11.0"
