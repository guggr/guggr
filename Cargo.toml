[workspace]
members = ["gen/proto_types", "config"]

resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Guggr"]

[workspace.dependencies]
prost = "0.14"
validator = { version = "0.20", features = ["derive"] }
gen-proto-types = { path = "gen/proto_types" }
prost-build = "0.14"
protocheck = "0.1"
protocheck-build = "0.1"
anyhow = "1.0.100"
temp-env = "0.3.6"
