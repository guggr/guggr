[workspace]
members = ["agent", "gen/proto_types", "config", "database/database-client"]

resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Guggr"]

[workspace.dependencies]
prost = "0.14"
gen-proto-types = { path = "gen/proto_types" }
config = { path = "config" }
prost-build = "0.14"
protocheck = "0.1"
protocheck-build = "0.1"
temp-env = "0.3.6"
urlencoding = "2.1.3"
diesel = "2.3.6"
chrono = "0.4.43"
diesel_migrations = "2.3.1"
thiserror = "2.0.18"
async-trait = "0.1.89"
futures-lite = "2.6.1"
lapin = "3.7.2"
tokio = "1.49.0"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
dotenv = "0.15.0"
rand = "0.9.2"
reqwest = "0.13.1"
surge-ping = "0.8.4"
httpmock = "0.8.3"
