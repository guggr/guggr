[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Guggr"]

[workspace.dependencies]
deadpool-lapin = "0.13.1"
prost = "0.14"
prost-build = "0.14"
protocheck = "0.1"
protocheck-build = "0.1"
temp-env = "0.3.6"
urlencoding = "2.1.3"
lapin = "3.7.2"
proto-types = "0.2.0"
thiserror = "2.0.18"
tokio = "1.49.0"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
async-trait = "0.1.89"
config = { version = "0.1.0", path = "config" }
diesel = "2.3.6"
chrono = "0.4.43"
diesel_migrations = "2.3.1"
gen-proto-types = { version = "0.1.0", path = "gen/proto_types" }
anyhow = "1.0.101"
database-client = { version = "0.1.0", path = "database/database-client" }
tokio-util = "0.7.18"
