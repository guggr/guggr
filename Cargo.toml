[workspace]
members = ["gen/proto_types", "config", "scheduler"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Guggr"]

[workspace.dependencies]
prost = "0.14"
validator = { version = "0.20", features = ["derive"] }
gen-proto-types = { path = "gen/proto_types" }
prost-build = "0.14"
protocheck = "0.1"
protocheck-build = "0.1"
anyhow = "1.0.100"
temp-env = "0.3.6"
urlencoding = "2.1.3"
deadpool-lapin = "0.13.1"
lapin = "3.7.2"
proto-types = "0.2.0"
thiserror = "2.0.18"
tokio = "1.49.0"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
async-trait = "0.1.89"
