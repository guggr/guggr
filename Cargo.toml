[workspace]
members = ["crates/guggr-agent",
    "crates/guggr-protobuf"
]

resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Guggr"]

[workspace.dependencies]
prost = "0.14"
validator = { version = "0.20", features = ["derive"] }
guggr-protobuf = { path = "crates/guggr-protobuf" }
