replicaCount: 1

image:
  repository: ghcr.io/guggr/guggr/frontend
  pullPolicy: IfNotPresent

imagePullSecrets: []

fullnameOverride: ""
nameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: ""
      namespace: ""
      sectionName: ""
  hostnames: []
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

autoscaling:
  enabled: false

nodeSelector: {}

resources: {}

tolerations: []

affinity: {}
