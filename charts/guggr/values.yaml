        paths:
          - path: /
            pathType: Prefix
    ## @param frontend.ingress.tls Ingress TLS configuration
    tls: []

  ## @section Frontend Service configuration
  service:
    ## @param frontend.service.port Api-service service port
    port: 80
    ## @param frontend.service.targetPort Api-service container port
    targetPort: 8080

  ## @section Frontend HTTPRoute
  httpRoute:
    ## @param frontend.httpRoute.enabled Enable Gateway API HTTPRoute generation for the Frontend
    enabled: false
    ## @param frontend.httpRoute.annotations Additional annotations for the HTTPRoute resource
    annotations: {}
    ## @param frontend.httpRoute.parentRefs [array] References to the parent Gateways
    parentRefs:
      - name: ""
        namespace: ""
        sectionName: ""
    ## @param frontend.httpRoute.hostnames List of hostnames to match
    hostnames: []
    ## @param frontend.httpRoute.rules [array] HTTPRoute rules
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /

  ## @section Frontend Additional Parameters
  ## @param frontend.podAnnotations Map of annotations to add to the pods
  podAnnotations: {}
  ## @param frontend.podLabels Map of labels to add to the pods
  podLabels: {}
  ## @param frontend.nodeSelector Node selector for scheduling pods onto specific nodes
  nodeSelector: {}
  ## @param frontend.tolerations Tolerations for scheduling pods onto tainted nodes
  tolerations: []
  ## @param frontend.affinity Pod affinity and anti-affinity rules
  affinity: {}
  ## @param frontend.resources [object] Resource requests and limits for the container
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  autoscaling:
    ## @param frontend.autoscaling.enabled Enable the HorizontalPodAutoscaler
    enabled: false
    ## @param frontend.autoscaling.minReplicas Minimum Replica count
    minReplicas: 1
    ## @param frontend.autoscaling.maxReplicas Maximum Replica count
    maxReplicas: 5
    ## @param frontend.autoscaling.targetCPUUtilizationPercentage Target CPU Utilization
    targetCPUUtilizationPercentage: 70

  ## @param frontend.volumeMounts [object] Additional volume mounts for the container
  volumeMounts:
    ## needed so readOnlyRootFilesystem can be enabled
    - name: tmp
      mountPath: /tmp

  ## @param frontend.volumes [object] Additional pod volumes for the deployment
  volumes:
    ## needed so readOnlyRootFilesystem can be enabled
    - name: tmp
      emptyDir: {}

  ## @section Frontend Security Context
  podSecurityContext:
    ## @param frontend.podSecurityContext.runAsNonRoot Configure the container to run as a non-root user
    runAsNonRoot: true
  securityContext:
    ## @param frontend.securityContext.allowPrivilegeEscalation Enable container privilege escalation
    allowPrivilegeEscalation: false
    ## @param frontend.securityContext.readOnlyRootFilesystem Mount container root filesystem as read-only
    readOnlyRootFilesystem: true
    ## @param frontend.securityContext.capabilities.drop Linux capabilities to be dropped
    capabilities:
      drop: ["ALL"]

