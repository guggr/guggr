## @section Postgres Parameters
postgres:
  ## @param postgres.enabled Enable the bundled Postgres Subchart
  enabled: true
  ## @param postgres.replicaCount Number of PostgreSQL replicas to deploy (Note: PostgreSQL doesn't support multi-master replication by default)
  replicaCount: 1
  auth:
    ## @param postgres.auth.username Name for default User that is created at startup
    username: guggr
    ## @param postgres.auth.database Name for default Database that is created at startup
    database: guggr

## @section RabbitMQ Parameters
rabbitmq:
  ## @param rabbitmq.enabled Enable the bundled RabbitMQ Subchart
  enabled: true
  ## @param rabbitmq.replicaCount Number of RabbitMQ replicas to deploy (clustering needs to be enabled to set more than 1 replicas)
  replicaCount: 1

  auth:
    ## @param rabbitmq.auth.enabled Enable RabbitMQ Authentication
    enabled: true
    ## @param rabbitmq.auth.username RabbitMQ default username
    username: guggr

  managementPlugin:
    ## @param rabbitmq.managementPlugin.enabled Enable RabbitMQ management plugin
    enabled: false

  ## @param rabbitmq.extraVolumes [array] Extra volumes to add to RabbitMQ pods
  extraVolumes:
    - name: definitions
      configMap:
        name: rabbitmq-definitions

  ## @param rabbitmq.extraVolumeMounts [array] Extra volumes to add to RabbitMQ pods
  extraVolumeMounts:
    - name: definitions
      mountPath: /etc/rabbitmq-definitions

  customScripts:
    ## @param rabbitmq.customScripts.postStart [object]
    ## load definitions after startup. The `definitions` key is not used since then we would have to add user & password
    ## into the definition file which isn't that easy
    postStart:
      enabled: true
      command:
        - sh
        - -ec
        - |
          sleep 5
          rabbitmqctl await_startup
          rabbitmqctl import_definitions /etc/rabbitmq-definitions/defs.json
    ## @param rabbitmq.customScripts.initContainers Custom init containers to run before RabbitMQ starts
    initContainers: []
