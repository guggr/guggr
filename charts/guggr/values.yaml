global:
  ## @section Global RabbitMQ parameters
  ## @descriptionStart
  ## These parameters are used by the `agent`, `evaluator` and `scheduler`
  ## @descriptionEnd
  rabbitmq:
    ## @param global.rabbitmq.host Global RabbitMQ set to this charts' `rabbitmq.fullname` by default
    host: ""
    ## @param global.rabbitmq.port Global RabbitMQ AMQP port
    port: 5672
    ## @param global.rabbitmq.jobsQueue queue for jobs. Must match the definition in [rabbitmq_definitions.json](files/rabbitmq_definitions.json) when using the bundled RabbitMQ chart
    jobsQueue: scheduler.jobs
    ## @param global.rabbitmq.jobResultQueue queue for job results. Must match the definition in [rabbitmq_definitions.json](files/rabbitmq_definitions.json) when using the bundled RabbitMQ chart
    jobResultQueue: agent.job_results
    auth:
      ## @param global.rabbitmq.auth.username Username of the RabbitMQ User
      username: guggr
      ## @param global.rabbitmq.auth.secretName Name of existing Secret containing the RabbitMQ Users' Password
      secretName: guggr-rabbitmq
      ## @param global.rabbitmq.auth.passwordKey Key in existing Secret containing the RabbitMQ Users' Password
      passwordKey: password
  ## @section Global Postgres parameters
  ## @descriptionStart
  ## These parameters are used by the `apiService`, `evaluator` and `scheduler`
  ## @descriptionEnd
  postgres:
    ## @param global.postgres.host Global Postgres Host, set to this charts' `postgres.fullname` by default
    host: ""
    ## @param global.postgres.port Global Postgres Port
    port: 5432
    auth:
      ## @param global.postgres.auth.secretName Name of existing Secret containing the Postgres Username, Password and Database Name
      secretName: guggr-postgres
      ## @param global.postgres.auth.usernameKey Key in existing Secret containing the Postgres Username
      usernameKey: username
      ## @param global.postgres.auth.passwordKey Key in existing Secret containing the Postgres Users' Password
      passwordKey: postgres-password
      ## @param global.postgres.auth.databaseKey Key in existing Secret containing the Postgres Database
      databaseKey: database

## @section Api-service Parameters
apiService:
  ## @param apiService.enabled Enable the Api-service
  enabled: true
  ## @param apiService.replicaCount Number of Api-service replicas to deploy
  replicaCount: 1
  ## @param apiService.logLevel Handed down to `RUST_LOG`. Possible values are `trace`, `debug`, `info`, `warn`, `error`
  logLevel: info

  ## @param apiService.fullnameOverride String to fully override `api-service.fullname`
  fullnameOverride: ""
  ## @param apiService.nameOverride String to partially override `api-service.fullname`
  nameOverride: ""

  ## @section Api-service Image Configuration
  image:
    ## @param apiService.image.repository The image repository
    repository: ghcr.io/guggr/guggr/api-service
    ## @param apiService.image.pullPolicy The image pull policy
    pullPolicy: Always
    ## @param apiService.image.tag [default: AppVersion] The image tag

  ## @param apiService.imagePullSecrets Image pull secrets
  imagePullSecrets: []

  ## @section Api-service Service Account
  serviceAccount:
    ## @param apiService.serviceAccount.create Specifies whether a service account should be created
    create: false
    ## @param apiService.serviceAccount.annotations Annotations to add to the service account
    annotations: {}
    ## @param apiService.serviceAccount.name The name of the service account to use. If not set and create is true, a name is generated using the `fullname` template
    name: ""
    ## @param apiService.serviceAccount.automount Whether to automount the SA token inside the pod
    automount: false

  ## @section Api-service Ingress
  ingress:
    ## @param apiService.ingress.enabled Enable ingress for the Api-service
    enabled: false
    ## @param apiService.ingress.className Ingress class name
    className: ""
    ## @param apiService.ingress.annotations Ingress annotations
    annotations: {}
    ## @param apiService.ingress.hosts [object] Ingress hosts configuration
    hosts:
      - host: guggr.internal
        paths:
          - path: /api
            pathType: Prefix
    ## @param apiService.ingress.tls Ingress TLS configuration
    tls: []

  ## @section Api-service Service configuration
  service:
    ## @param apiService.service.port Api-service service port
    port: 80
    ## @param apiService.service.targetPort Api-service container port
    targetPort: 8081

  ## @section Api-service HTTPRoute
  httpRoute:
    ## @param apiService.httpRoute.enabled Enable Gateway API HTTPRoute generation for the Api-service
    enabled: false
    ## @param apiService.httpRoute.annotations Additional annotations for the HTTPRoute resource
    annotations: {}
    ## @param apiService.httpRoute.parentRefs [array] References to the parent Gateways
    parentRefs:
      - name: ""
        namespace: ""
        sectionName: ""
    ## @param apiService.httpRoute.hostnames List of hostnames to match
    hostnames: []
    ## @param apiService.httpRoute.rules [array] HTTPRoute rules
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /

  ## @section Api-service Additional Parameters
  ## @param apiService.podAnnotations Map of annotations to add to the pods
  podAnnotations: {}
  ## @param apiService.podLabels Map of labels to add to the pods
  podLabels: {}
  ## @param apiService.nodeSelector Node selector for scheduling pods onto specific nodes
  nodeSelector: {}
  ## @param apiService.tolerations Tolerations for scheduling pods onto tainted nodes
  tolerations: []
  ## @param apiService.affinity Pod affinity and anti-affinity rules
  affinity: {}
  ## @param apiService.resources [object] Resource requests and limits for the container
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  autoscaling:
    ## @param apiService.autoscaling.enabled Enable the HorizontalPodAutoscaler
    enabled: false
    ## @param apiService.autoscaling.minReplicas Minimum Replica count
    minReplicas: 1
    ## @param apiService.autoscaling.maxReplicas Maximum Replica count
    maxReplicas: 5
    ## @param apiService.autoscaling.targetCPUUtilizationPercentage Target CPU Utilization
    targetCPUUtilizationPercentage: 70

  ## @section Api-service Security Context
  podSecurityContext:
    ## @param apiService.podSecurityContext.runAsNonRoot Configure the container to run as a non-root user
    runAsNonRoot: true
  securityContext:
    ## @param apiService.securityContext.allowPrivilegeEscalation Enable container privilege escalation
    allowPrivilegeEscalation: false
    ## @param apiService.securityContext.readOnlyRootFilesystem Mount container root filesystem as read-only
    readOnlyRootFilesystem: true
    ## @param apiService.securityContext.capabilities.drop Linux capabilities to be dropped
    capabilities:
      drop: ["ALL"]

  ## @section Api-service Environment variables
  env:
    ## @param apiService.env.port Port the Api-service listens on. Must match with `apiService.service.targetPort`
    port: 8081
    ## @param apiService.env.host Host the Api-service binds to
    host: 0.0.0.0
    ## @param apiService.env.auth_ttl TTL of auth tokens
    auth_ttl: 900
    ## @param apiService.env.auth_refresh_ttl TTL of refresh tokens
    auth_refresh_ttl: "2419200"


