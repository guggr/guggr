{{- if .Values.evaluator.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "evaluator.serviceAccountName" . }}
  labels:
    {{- include "evaluator.labels" . | nindent 4 }}
  {{- with .Values.evaluator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.evaluator.serviceAccount.automount }}
{{- end }}
