syntax = "proto3";
package guggr.job_result.v1;

import "result/types/http.proto";
import "result/types/ping.proto";

import "google/protobuf/timestamp.proto";

import "buf/validate/validate.proto";

message JobResult {
    string id = 1 [(buf.validate.field).required = true];
    google.protobuf.Timestamp timestamp = 2 [(buf.validate.field).required = true];
    string batch_id = 3 [(buf.validate.field).required = true];

    option (buf.validate.message).oneof = { fields: ["http", "ping"], required: true };

    guggr.job_result.types.v1.HttpJobResult http = 16;
    guggr.job_result.types.v1.PingJobResult ping = 17;
}
