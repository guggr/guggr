syntax = "proto3";
package guggr.job_result.types.v1;

import "google/protobuf/duration.proto";

import "buf/validate/validate.proto";

message HttpJobResult {
    bool reachable = 1 [(buf.validate.field).required = true];
    // Not required if unreachable
    bytes ip_address = 2;
    int32 status_code = 3;
    google.protobuf.Duration latency = 4;
    bytes payload = 5;
}
