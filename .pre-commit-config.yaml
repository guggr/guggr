fail_fast: true

default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/crate-ci/typos
    rev: v1.42.3
    hooks:
      - id: typos

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: local
    hooks:
      - id: golangci-fmt
        name: run golangci-lint fmt
        language: system
        entry: golangci-lint fmt -d
        pass_filenames: false

      # deactivated while there is no real go project yet
      #      - id: golangci-lint
      #        name: run golangci-lint
      #        language: system
      #        entry: golangci-lint run
      #        pass_filenames: false

      - id: prettier-check
        name: run pnpm check
        language: system
        entry: pnpm run check
        pass_filenames: false

      - id: trufflehog
        name: run trufflehog
        entry: bash -c  'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail'
        language: system
        stages: ['commit', 'push']
