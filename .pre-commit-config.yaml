fail_fast: true

default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/crate-ci/typos
    rev: v1.42.3
    hooks:
      - id: typos

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  - repo: local
    hooks:
      - id: golangci-fmt
        name: run golangci-lint fmt
        types: [go]
        language: system
        entry: golangci-lint fmt -d
        pass_filenames: false

      - id: golangci-lint
        name: run golangci-lint
        types: [go]
        language: system
        entry: golangci-lint run api-service
        pass_filenames: false

      - id: prettier-check
        name: run pnpm check
        language: system
        entry: pnpm run check
        pass_filenames: false

      - id: trufflehog
        name: run trufflehog
        entry: bash -c  'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail'
        language: system
        stages: ['commit', 'push']

      - id: helm-lint
        name: run helm lint
        language: system
        entry: helm lint charts
        pass_filenames: false
        files: ^charts/

      - id: cargo-fmt
        name: run cargo fmt
        types: [rust]
        language: system
        entry: cargo +nightly fmt --check
        pass_filenames: false

      - id: cargo-clippy
        name: run clippy
        types: [rust]
        language: system
        entry: cargo clippy
        pass_filenames: false

      - id: cargo-nextest
        name: run cargo nextest
        types: [rust]
        language: system
        entry: cargo nextest run --no-tests warn
        pass_filenames: false

      - id: cargo-autoinherit
        name: run cargo autoinherit
        types: [rust]
        language: system
        entry: cargo autoinherit
        pass_filenames: false

      - id: cargo-machete
        name: run cargo machete
        types: [rust]
        language: system
        entry: cargo machete
        pass_filenames: false
