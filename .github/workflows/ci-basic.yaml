name: basic ci
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      rustBacktrace:
        description: 'Rust Backtrace'
        required: false
        default: '1'
        type: choice
        options:
          - '0'
          - '1'
          - FULL

permissions:
  contents: read

jobs:
  changes:
    name: 🎯 identify changes
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: read
      contents: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      pnpm: ${{ steps.filter.outputs.pnpm }}
      frontend: ${{ steps.filter.outputs.frontend }}
      go: ${{ steps.filter.outputs.go }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            rust:
              - agent/**
              - api-service/**
              - scheduler/**
              - evaluator/**
              - database/database-client/**
              - gen/**
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
            pnpm:
              - pnpm-lock.yaml
              - package.json
              - frontend/**
              - '**/*.yaml'
              - '**/*.json'
              - '**/*.sql'
              - '!charts/**'
            frontend:
              - frontend/web/**
            helm: charts/**

  pnpm-fmt:
    name: 🐛 formatting - pnpm
    needs: changes
    if: ${{ needs.changes.outputs.pnpm == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0
      #   cache: true - key will be available in next action release
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Check
        run: pnpm check

  pnpm-lint-frontend:
    name: 🐛 formatting & linting - pnpm (frontend)
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@v4.2.0
      #   cache: true - key will be available in next action release
      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile
      - name: Check
        working-directory: frontend/web
        run: pnpm check
      - name: Test build
        working-directory: frontend/web
        run: pnpm build

  cargo-fmt:
    name: 🐛 formatting - cargo nightly
    runs-on: ubuntu-24.04
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - run: rustup update nightly && rustup default nightly
      - run: rustup component add rustfmt --toolchain nightly
      - run: cargo +nightly fmt --check

  cargo-lint:
    name: 🐛 formatting & linting - cargo
    runs-on: ubuntu-24.04
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: protobuf-compiler
      - run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2.8.2
        with:
          cache-on-failure: true
      - run: cargo clippy --all-features --all-targets -- -D warnings

  helm-lint:
    name: 🐛 lint - helm
    runs-on: ubuntu-24.04
    needs: changes
    if: ${{ needs.changes.outputs.helm == 'true' }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: igabaydulin/helm-check-action@0.2.1
        env:
          CHART_LOCATION: ./charts
          CHART_VALUES: ./charts/values.yaml

  cargo-nextest:
    name: 🧐 testing - cargo
    runs-on: ubuntu-24.04
    needs:
      - cargo-lint
      - cargo-fmt
      - changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: awalsh128/cache-apt-pkgs-action@v1.6.0
        with:
          packages: protobuf-compiler
      - run: rustup update stable && rustup default stable
      - uses: cargo-bins/cargo-binstall@v1.17.5
      - run: cargo binstall cargo-nextest
      - uses: Swatinem/rust-cache@v2.8.2
        with:
          cache-on-failure: true
      - run: cargo nextest run --no-tests warn --all-features --all-targets -P ci
        env:
          RUST_BACKTRACE: ${{ inputs.rustBacktrace || '0' }}

  fetch-depth:
    name: 🧮 calculate fetch depth
    runs-on: ubuntu-24.04
    outputs:
      depth: ${{ steps.depth-push.outputs.depth || steps.depth-pr.outputs.depth }}
      branch: ${{ steps.depth-push.outputs.branch || steps.depth-pr.outputs.branch }}
    env:
      COMMITS_JSON: ${{ toJson(github.event.commits) }}
    steps:
      - name: Set depth push
        id: depth-push
        shell: bash
        if: github.event_name == 'push'
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
        run: |
          COUNT=$(echo "$COMMITS_JSON" | jq 'length')
          echo "depth=$((COUNT + 2))" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
      - name: Set depth PR
        id: depth-pr
        shell: bash
        if: github.event_name == 'pull_request'
        run: |
          echo "depth=$((${{ github.event.pull_request.commits }}+2))" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

  trufflehog:
    name: 🔐 secret scanning
    runs-on: ubuntu-24.04
    needs: fetch-depth
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{needs.fetch-depth.outputs.branch}}
          fetch-depth: ${{needs.fetch-depth.outputs.depth}}
      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@v3.93.4
        with:
          extra_args: --results=verified,unknown
